<!-- Equipment Selection (Categorized & Expanded) -->
<div class="mb-5">
    <h2 class="text-[20px] mb-2 font-normal">Hvilket udstyr?</h2>
    <div class="relative">
        <select id="equipment-select" class="w-full panel-bg appearance-none rounded-lg pl-4 pr-10 py-3 text-lg text-white focus:outline-none cursor-pointer">
            
            <optgroup label="Indbygget hardware" class="bg-slate-800 text-gray-400 font-normal">
                <option value="iPhone_Ny" class="text-white">📱 iPhone (Nyere end 3 år)</option>
                <option value="Android_Flagskib" class="text-white">📱 Premium Android (Samsung S / Pixel < 3 år)</option>
                <option value="Smartphone_Gammel" class="text-white">📱 Smartphone (Ældre end 3 år / Budget)</option>
            </optgroup>

            <optgroup label="Kalibrerede målemikrofoner" class="bg-slate-800 text-gray-400 font-normal">
                <option value="Dayton_iMM6" class="text-white">🎙️ Dayton iMM-6 / iMM-6C</option>
                <option value="MicW_i436" class="text-white">🎙️ MicW i436 (Klasse 2 måler)</option>
                <option value="MiniDSP_UMIK" class="text-white">🎙️ MiniDSP UMIK-1 / UMIK-2</option>
            </optgroup>

            <optgroup label="Andet udstyr" class="bg-slate-800 text-gray-400 font-normal">
                <option value="Rode_VideoMic" class="text-white">🎤 Røde VideoMic (Me-C / Me-L / GO)</option>
                <option value="Pro_Stojmaaler" class="text-white">🎛️ Professionel Klasse 1 / 2 lydmåler</option>
                <option value="Andet" class="text-white">❓ Andet eksternt udstyr</option>
            </optgroup>

        </select>
        <!-- Custom "V" arrow from mockup -->
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-5 text-white text-xl">V</div>
    </div>
</div>
